<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JS Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-status">Mode: %VITE_APP_STATUS%</div>
  <main class="app">
    <h1>Калькулятор</h1>

    <section class="calc" aria-label="Calculator">
      <input id="display" class="display" type="text" inputmode="decimal" autocomplete="off"
             placeholder="0" aria-label="Display" />

      <div class="keys">
        <button class="key key--muted" data-action="clear">C</button>
        <button class="key key--muted" data-action="back">⌫</button>
        <button class="key key--muted" data-action="percent">%</button>
        <button class="key key--op" data-op="/">÷</button>

        <button class="key" data-digit="7">7</button>
        <button class="key" data-digit="8">8</button>
        <button class="key" data-digit="9">9</button>
        <button class="key key--op" data-op="*">×</button>

        <button class="key" data-digit="4">4</button>
        <button class="key" data-digit="5">5</button>
        <button class="key" data-digit="6">6</button>
        <button class="key key--op" data-op="-">−</button>

        <button class="key" data-digit="1">1</button>
        <button class="key" data-digit="2">2</button>
        <button class="key" data-digit="3">3</button>
        <button class="key key--op" data-op="+">+</button>

        <button class="key key--wide" data-action="sign">±</button>
        <button class="key" data-action="dot">.</button>
        <button class="key key--equals" data-action="equals">=</button>
      </div>

      <p class="hint">Клікни або вводь з клавіатури: 0-9, + - * /, Enter, Backspace, Esc.</p>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
